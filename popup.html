<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>TVING Sports Ad Muter</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        margin: 0;
        padding: 14px 16px;
        width: 240px;
        font-size: 13px;
      }
      h1 {
        font-size: 13px;
        font-weight: 600;
        margin: 0 0 10px 0;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 6px 0;
      }
      .status {
        margin-top: 10px;
        padding: 8px 10px;
        border-radius: 6px;
        background: rgba(127, 127, 127, 0.12);
        font-size: 12px;
      }
      .status .label { opacity: 0.6; }
      .status .value { font-weight: 600; margin-left: 6px; }
      .value.ad { color: #d97706; }
      .value.playing { color: #16a34a; }
      .value.idle { color: #6b7280; }

      /* Toggle */
      .switch { position: relative; display: inline-block; width: 36px; height: 20px; }
      .switch input { opacity: 0; width: 0; height: 0; }
      .slider {
        position: absolute; inset: 0; cursor: pointer;
        background: #9ca3af; border-radius: 20px; transition: 0.15s;
      }
      .slider::before {
        content: ""; position: absolute; height: 16px; width: 16px;
        left: 2px; bottom: 2px; background: white; border-radius: 50%;
        transition: 0.15s;
      }
      input:checked + .slider { background: #16a34a; }
      input:checked + .slider::before { transform: translateX(16px); }
    </style>
  </head>
  <body>
    <h1>TVING Sports Ad Muter</h1>
    <div class="row">
      <span>Enabled</span>
      <label class="switch">
        <input type="checkbox" id="enabled" />
        <span class="slider"></span>
      </label>
    </div>
    <div class="status">
      <span class="label">Status:</span>
      <span class="value idle" id="status">…</span>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
